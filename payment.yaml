- name: setup payment Service
  hosts: payment
  become: yes
  tasks:
   - name: install python language
     ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
     loop:
      - python3 
      - gcc 
      - python3-devel
   - name: create  asystem user 
     ansible.builtin.user:
      name: roboshop
      comment: create user for app 
      system: true
      shell: /sbin/nologin
      home: /app
   - name: removing app directory
     ansible.builtin.file:
      path: /app
      state: absent
   - name: creating the app directory
     ansible.builtin.file:
      path: /app
      state: directory
   - name: removie zip file
     ansible.builtin.file:
      path: /tmp/payment.zip
      state: absent
   - name: download the code
     ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip
   - name: unzip the file
     ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes
   - name: install dependencies
     ansible.builtin.pip:
      requirements: requirements.txt
      executable: pip3.9
     args:
      chdir: /app
   - name: copy payment service
     ansible.builtin.copy:
      src: payment.service
      dest: /etc/systemd/system/payment.service
   - name: daemon reload
     ansible.builtin.systemd_service:
      daemon_reload: true

   - name: enable and start payment
     ansible.builtin.service:
      name: payment
      state: started
      enabled: yes
     

     
  